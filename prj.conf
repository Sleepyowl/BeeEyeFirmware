CONFIG_TICKLESS_KERNEL=y

CONFIG_MINIMAL_LIBC=y
CONFIG_MINIMAL_LIBC_LL_PRINTF=y
CONFIG_MINIMAL_LIBC_TIME=y

CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y

# LoRa
CONFIG_SPI=y
CONFIG_LORA=y
CONFIG_LORA_SX126X=y

# BLE
CONFIG_BT=y
CONFIG_BT_LL_SOFTDEVICE=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y

# BLE trim down to fit RAM
CONFIG_BT_BUF_EVT_RX_COUNT=3
CONFIG_BT_BUF_CMD_TX_COUNT=2
CONFIG_BT_BUF_ACL_TX_COUNT=1
# CONFIG_BT_BUF_EVT_RX_SIZE=68

#1W
CONFIG_W1=y
CONFIG_W1_NET=y

# RTC
CONFIG_I2C=y
CONFIG_RTC=y
CONFIG_RTC_ALARM=y

# ADC
CONFIG_ADC=y
CONFIG_NRFX_SAADC=y

# UART
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# LOGGGY
CONFIG_CONSOLE=n
# CONFIG_UART_CONSOLE=y
# CONFIG_EXCEPTION_DEBUG=y
CONFIG_PRINTK=n
CONFIG_LOG=n
